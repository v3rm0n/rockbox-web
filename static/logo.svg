<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="crate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbb04e"/>
      <stop offset="100%" stop-color="#a87f28"/>
    </linearGradient>
    <linearGradient id="crateTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c46a"/>
      <stop offset="100%" stop-color="#c49a3c"/>
    </linearGradient>
    <linearGradient id="vinyl" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#383530"/>
      <stop offset="100%" stop-color="#1e1c19"/>
    </linearGradient>
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#131210"/>

  <!-- Vinyl record peeking from crate -->
  <g transform="translate(256, 176)">
    <circle r="88" fill="url(#vinyl)"/>
    <circle r="74" fill="none" stroke="#4a463e" stroke-width="0.5" opacity="0.35"/>
    <circle r="60" fill="none" stroke="#4a463e" stroke-width="0.5" opacity="0.3"/>
    <circle r="46" fill="none" stroke="#4a463e" stroke-width="0.5" opacity="0.25"/>
    <!-- Label -->
    <circle r="24" fill="url(#crate)"/>
    <circle r="24" fill="none" stroke="#e8c46a" stroke-width="0.5" opacity="0.3"/>
    <!-- Spindle -->
    <circle r="3.5" fill="#131210"/>
    <!-- Disc sheen -->
    <circle r="88" fill="url(#shine)"/>
  </g>

  <!-- Crate body -->
  <rect x="116" y="232" width="280" height="164" rx="10" fill="url(#crate)"/>

  <!-- Top rim of crate -->
  <rect x="116" y="232" width="280" height="16" rx="6" fill="url(#crateTop)"/>

  <!-- Slats -->
  <rect x="116" y="296" width="280" height="3" rx="1.5" fill="#1a1815" opacity="0.18"/>
  <rect x="116" y="348" width="280" height="3" rx="1.5" fill="#1a1815" opacity="0.18"/>

  <!-- Handle cutout -->
  <rect x="220" y="316" width="72" height="14" rx="7" fill="#131210" opacity="0.4"/>

  <!-- Subtle inner shadow on crate top -->
  <rect x="116" y="248" width="280" height="4" fill="#1a1815" opacity="0.06" rx="2"/>
</svg>
