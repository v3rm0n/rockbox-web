<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="crateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8922e"/>
    </linearGradient>
    <linearGradient id="discGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ece8e1"/>
      <stop offset="100%" stop-color="#c8c3ba"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="512" height="512" rx="96" fill="#1a1815"/>

  <!-- Crate body (front face) -->
  <rect x="106" y="220" width="300" height="200" rx="12" fill="url(#crateGrad)" opacity="0.9"/>

  <!-- Crate slats (horizontal lines) -->
  <rect x="106" y="280" width="300" height="4" rx="2" fill="#1a1815" opacity="0.25"/>
  <rect x="106" y="340" width="300" height="4" rx="2" fill="#1a1815" opacity="0.25"/>

  <!-- Crate side panel (3D depth - right) -->
  <path d="M406,220 L440,195 L440,395 L406,420" fill="#b8922e" opacity="0.6"/>

  <!-- Crate side panel (3D depth - top rim) -->
  <path d="M106,220 L140,195 L440,195 L406,220 Z" fill="#e0ba5c" opacity="0.5"/>

  <!-- Vinyl record sticking out -->
  <g transform="translate(256, 190)">
    <!-- Record outer disc -->
    <circle cx="0" cy="0" r="95" fill="#2d2a25" stroke="#3a362f" stroke-width="2"/>
    <!-- Grooves -->
    <circle cx="0" cy="0" r="80" fill="none" stroke="#3a362f" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="65" fill="none" stroke="#3a362f" stroke-width="0.8" opacity="0.6"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#3a362f" stroke-width="0.8" opacity="0.6"/>
    <!-- Label -->
    <circle cx="0" cy="0" r="30" fill="url(#crateGrad)"/>
    <!-- Center hole -->
    <circle cx="0" cy="0" r="5" fill="#1a1815"/>
    <!-- Label shine -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#e0ba5c" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Crate front handle cutout -->
  <rect x="216" y="310" width="80" height="20" rx="10" fill="#1a1815" opacity="0.5"/>
</svg>
